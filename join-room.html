<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Role-n-Task-Gen</title>
    <link type="text/css" rel="stylesheet" href="w3.css" />
    <link rel="icon" type="image/jpg" href="favicon.ico" />
  </head>
  <body class="w3-black">
    <header class="w3-row w3-blue w3-text-black">
      <div class="w3-container w3-half">
        <h1>Role and Task Gen</h1>
      </div>
      <nav class="w3-container w3-padding w3-rest" style="margin-top: 8px">
        <button
          type="button"
          id="index-button"
          onclick="document.location='index.html'"
          class="nav-btn w3-btn w3-round-xlarge w3-light-blue w3-hover-indigo"
        >
          <b>Home</b>
        </button>
        <button
          type="button"
          id="join-button"
          onclick="document.location='join-room.html'"
          class="nav-btn w3-btn w3-round-xlarge w3-light-blue w3-hover-indigo"
        >
          <b>Join Room</b>
        </button>
        <button
          type="button"
          id="host-button"
          onclick="document.location='host-room.html'"
          class="nav-btn w3-btn w3-round-xlarge w3-light-blue w3-hover-indigo"
        >
          <b>Host Room</b>
        </button>
      </nav>
    </header>

    <main class="w3-panel">
      <section class="w3-card-4">
        <header class="w3-container w3-teal">
          <h2>Join Room</h2>
        </header>
        <form class="w3-container w3-dark-gray">
          <p>
            <label><b>Username</b></label>
            <input class="w3-input w3-border w3-round" type="text" />
          </p>
          <p>
            <label><b>Room Code</b></label>
            <input class="w3-input w3-border w3-round" type="text" />
          </p>
          <p>
            <button class="w3-btn w3-round-xlarge w3-light-blue">
              <b>Join</b>
            </button>
          </p>
        </form>
      </section>
      <section class="w3-container">
        <p>If a room has been created, then you may join it.</p>
        <p>
          To join a room, you must enter a username (max length of 10
          characters) and the room code, then click the join button.
        </p>
      </section>
    </main>

    <footer class="w3-container w3-blue-gray w3-text-black">
      <h3>
        Contact me at: <a href="mailto:name@example.com">name@example.com</a>
      </h3>
    </footer>
  </body>
</html>
